# ShellCheck — dogfood apexyard itself
#
# Runs shellcheck against the hook scripts under .claude/hooks/ to catch
# portability bugs, quoting mistakes, and common shell pitfalls. The hook
# scripts are the mechanical enforcement layer for the apexyard workflow,
# so any bug there weakens the whole stack.

name: ShellCheck

on:
  pull_request:
    paths:
      - ".claude/hooks/**"
      - ".github/workflows/shellcheck.yml"
  push:
    branches: [main]
    paths:
      - ".claude/hooks/**"
      - ".github/workflows/shellcheck.yml"

permissions:
  contents: read

jobs:
  shellcheck:
    name: shellcheck .claude/hooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          scandir: "./.claude/hooks"
          severity: warning
          ignore_paths: >-
            .claude/hooks/README.md
