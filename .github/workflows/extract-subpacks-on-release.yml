name: extract-subpacks-on-release

# Re-bundle the marketplace sub-packs (apexyard/audit-pack + apexyard/safety-hooks)
# from upstream HEAD on every framework release tag, then run the smoke test
# that asserts no framework-distinctive elements leaked. The actual push to the
# Claude Code marketplace remains a manual operator step in v1 — this workflow
# scaffolds the build artefact, opens a sync PR, and the operator drives the
# publish step from there.
#
# Trigger:
#   - On push of a `v*` tag (e.g. v1.4.0) cut by the /release skill
#   - On manual dispatch (operator can re-run extraction outside a release if needed)
#
# The pull_request trigger also runs on any PR touching extraction-related
# files so contributors get fast feedback when their PR breaks the extraction.
#
# See docs/agdr/AgDR-0049-marketplace-subpacks-as-funnel.md for the rationale.

on:
  push:
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'bin/extract-subpacks.sh'
      - '.claude/hooks/tests/test_subpack_extraction.sh'
      - 'marketplace/**'
      - '.claude/skills/launch-check/**'
      - '.claude/skills/seo-audit/**'
      - '.claude/skills/geo-audit/**'
      - '.claude/skills/accessibility-audit/**'
      - '.claude/skills/compliance-check/**'
      - '.claude/skills/analytics-audit/**'
      - '.claude/skills/monitoring-audit/**'
      - '.claude/skills/docs-audit/**'
      - '.claude/skills/performance-audit/**'
      - '.claude/hooks/_lib-audit-history.sh'
      - '.claude/hooks/_lib-read-config.sh'
      - '.claude/hooks/_lib-ops-root.sh'
      - '.claude/hooks/_lib-tracker.sh'
      - '.claude/hooks/_lib-extract-pr.sh'
      - '.claude/hooks/check-secrets.sh'
      - '.claude/hooks/block-main-push.sh'
      - '.claude/hooks/block-git-add-all.sh'
      - '.claude/hooks/pre-push-gate.sh'
      - '.claude/hooks/verify-commit-refs.sh'
      - '.claude/hooks/validate-pr-create.sh'
      - '.claude/hooks/validate-branch-name.sh'
      - '.claude/registries/ai-crawlers.json'
      - 'templates/audits/**'
  workflow_dispatch:

jobs:
  extract-subpacks:
    name: extract sub-packs + run smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history so EXTRACTION_MANIFEST records a real SHA

      - name: Run the extraction script
        run: bash bin/extract-subpacks.sh

      - name: Run the extraction smoke test
        run: bash .claude/hooks/tests/test_subpack_extraction.sh

      - name: Upload extracted sub-packs as build artefacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: marketplace-subpacks
          path: marketplace/
          retention-days: 90

      - name: Summary
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "## Sub-pack extraction summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Release tag: \`${GITHUB_REF#refs/tags/}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Upstream SHA: \`${GITHUB_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### audit-pack" >> "$GITHUB_STEP_SUMMARY"
          echo "Files extracted: $(find marketplace/audit-pack -type f | wc -l)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### safety-hooks" >> "$GITHUB_STEP_SUMMARY"
          echo "Files extracted: $(find marketplace/safety-hooks -type f | wc -l)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Next steps (operator)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "1. Download the \`marketplace-subpacks\` artefact from this run" >> "$GITHUB_STEP_SUMMARY"
          echo "2. Push the audit-pack to the Claude Code marketplace as \`apexyard/audit-pack@${GITHUB_REF#refs/tags/}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Push the safety-hooks to the Claude Code marketplace as \`apexyard/safety-hooks@${GITHUB_REF#refs/tags/}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Automated marketplace publish is deferred to v2 of this workflow — see AgDR-0049." >> "$GITHUB_STEP_SUMMARY"
