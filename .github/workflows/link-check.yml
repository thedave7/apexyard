# Link Check — dogfood apexyard itself
#
# Uses lychee to find broken links in site/index.html and all *.md files.
# Private / loopback addresses are allowed because some docs reference
# localhost examples.

name: Link Check

on:
  pull_request:
    paths:
      - "**/*.md"
      - "site/**"
      - ".github/workflows/link-check.yml"
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - "site/**"
      - ".github/workflows/link-check.yml"
  schedule:
    # Weekly catch for link rot on upstream docs
    - cron: "0 6 * * 1"

permissions:
  contents: read
  issues: write

jobs:
  lychee:
    name: lychee
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --include-fragments
            --exclude-loopback
            --exclude-private
            --accept 200,204,206,301,302,429
            --base https://yard.apexscript.com/
            'site/index.html'
            '**/*.md'
          fail: true
