# Markdown Lint — dogfood apexyard itself
#
# Catches broken markdown and inconsistent headings across the repo.
# Uses a relaxed ruleset via .markdownlint.json at the repo root — we care
# about real problems (bad links, malformed tables, duplicate headings) and
# not cosmetic nits (line length, trailing spaces, emphasis style).

name: Markdown Lint

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".markdownlint.json"
      - ".github/workflows/markdown-lint.yml"
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".markdownlint.json"
      - ".github/workflows/markdown-lint.yml"

permissions:
  contents: read

jobs:
  markdownlint:
    name: markdownlint-cli2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23
        with:
          globs: |
            **/*.md
            #node_modules
            #.git
